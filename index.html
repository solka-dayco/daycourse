<!DOCTYPE html>
<script>window.location.replace('feed.html');</script>

<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <header>
    <span>💕 데이트 코스 만들기</span>
    <a href="feed.html" class="header-btn">피드 보기</a>
  </header>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header> 테스트</header>

  <div class="container">

    <!-- 검색창 -->
    <div class="search-box">
      <input type="text" id="search-input" placeholder="장소를 검색하세요">
      <button id="search-btn">검색</button>
    </div>

    <!-- 검색 결과 드롭다운 목록 -->
    <ul id="search-result"></ul>

    <!-- 지도 + 내 위치 버튼 묶음 -->
    <div class="map-wrapper">
      <div id="map"></div>
      <button id="my-location-btn">📍</button>
    </div>

    <!-- 매장 정보 미리보기 -->
    <div id="place-preview" class="hidden">
      <div class="preview-info">
        <p id="preview-name"></p>
        <p id="preview-category"></p>
        <p id="preview-address"></p>
        <p id="preview-phone"></p>
        <a id="preview-link" href="#" target="_blank" class="preview-kakao-btn">
          카카오맵에서 리뷰/예약 확인 →
        </a>
      </div>
      <button id="add-btn">+ 코스에 추가</button>
    </div>

    <!-- 코스 목록 + 저장 -->
    <div class="course-section">
      <h3>📍 내 코스</h3>
      <ul id="course-list"></ul>

      <!-- 사진 4장 업로드 -->
    <div class="photo-upload-box">
      <p class="photo-upload-title">📷 코스 사진 4장 업로드</p>
      <div class="photo-grid">
        <label class="photo-slot" for="photo1">
          <input type="file" id="photo1" accept="image/*" hidden>
          <span>+</span>
          <img id="preview1" class="hidden">
        </label>
        <label class="photo-slot" for="photo2">
          <input type="file" id="photo2" accept="image/*" hidden>
          <span>+</span>
          <img id="preview2" class="hidden">
        </label>
        <label class="photo-slot" for="photo3">
          <input type="file" id="photo3" accept="image/*" hidden>
          <span>+</span>
          <img id="preview3" class="hidden">
        </label>
        <label class="photo-slot" for="photo4">
          <input type="file" id="photo4" accept="image/*" hidden>
          <span>+</span>
          <img id="preview4" class="hidden">
        </label>
      </div>
    </div>

    <!-- 크롭 팝업 -->
    <div id="crop-modal" class="hidden">
      <div class="crop-modal-inner">
        <p class="crop-title">사진을 드래그해서 위치를 조정하세요</p>
        <div class="crop-area">
          <div class="crop-box">
            <img id="crop-image">
          </div>
        </div>
        <div class="crop-actions">
          <button id="crop-cancel">취소</button>
          <button id="crop-confirm">확인</button>
        </div>
      </div>
    </div>

    <!-- 사진 슬라이더 팝업 -->
    <div id="photo-viewer" class="hidden">
      <div class="photo-viewer-inner">
        <button id="viewer-close">✕</button>
        <button id="viewer-prev">‹</button>
        <div class="viewer-img-wrap">
          <img id="viewer-img">
        </div>
        <button id="viewer-next">›</button>
        <div class="viewer-dots" id="viewer-dots"></div>
      </div>
    </div>

      <!-- 코스 이름 입력 + 저장 버튼 -->
      <div class="save-box">
        <input type="text" id="course-name" placeholder="코스 이름을 입력하세요">
        <button id="save-btn">저장</button>
      </div>
    </div>

    <!-- 저장된 코스 목록 -->
    <div class="saved-section">
      <h3>💾 저장된 코스</h3>
      <ul id="saved-list"></ul>
    </div>

  </div>

  <!-- 카카오맵 SDK -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=725e3b5f43c47c651837511245861cc8&autoload=false&libraries=services"></script>

  <!-- 드래그 순서 조정 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <script type="module" src="app.js"></script>
</body>
</html>
