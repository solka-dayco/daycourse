<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데이트 코스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>💕 데이트 코스 만들기</header>

  <div class="container">

    <!-- 검색창 -->
    <div class="search-box">
      <input type="text" id="search-input" placeholder="장소를 검색하세요">
      <button id="search-btn">검색</button>
    </div>

    <!-- 검색 결과 드롭다운 목록 -->
    <ul id="search-result"></ul>

    <!-- 지도 영역 -->
    <div id="map"></div>

    <!-- 매장 정보 미리보기 (검색 결과 클릭 시 표시) -->
    <div id="place-preview" class="hidden">
      <div class="preview-info">
        <p id="preview-name"></p>
        <p id="preview-address"></p>
        <p id="preview-category"></p>
      </div>
      <button id="add-btn">+ 코스에 추가</button>
    </div>

    <!-- 코스 목록 + 저장 -->
    <div class="course-section">
      <h3>📍 내 코스</h3>
      <ul id="course-list"></ul>

      <!-- 코스 이름 입력 + 저장 버튼 -->
      <div class="save-box">
        <input type="text" id="course-name" placeholder="코스 이름을 입력하세요">
        <button id="save-btn">저장</button>
      </div>
    </div>

    <!-- 저장된 코스 목록 -->
    <div class="saved-section">
      <h3>💾 저장된 코스</h3>
      <ul id="saved-list"></ul>
    </div>

  </div>

  <!-- 카카오맵 SDK -->
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=725e3b5f43c47c651837511245861cc8&autoload=false&libraries=services"></script>

  <!-- 드래그 순서 조정 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
