<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코스 만들기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar-overlay"></div>
  <div id="sidebar">
    <div class="sidebar-header">
      <span>데이코스</span>
      <button id="sidebar-close">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="feed.html">피드</a>
      <a href="create.html">새 게시물</a>
    </nav>
    <div id="sidebar-auth"></div>
  </div>

  <header>
    <button id="menu-btn">☰</button>
    <a href="feed.html" class="page-title">데이코스</a>
  </header>

  <div class="container">

    <!-- 검색창 -->
    <div class="search-box">
      <input type="text" id="search-input" placeholder="장소를 검색하세요">
      <button id="search-btn">검색</button>
    </div>

    <!-- 검색 결과 드롭다운 목록 -->
    <ul id="search-result"></ul>

    <!-- 지도 + 내 위치 버튼 묶음 -->
    <div class="map-wrapper">
      <div id="map"></div>
      <button id="my-location-btn">📍</button>
    </div>

    <!-- 매장 정보 미리보기 -->
    <div id="place-preview" class="hidden">
      <div class="preview-info">
        <p id="preview-name"></p>
        <p id="preview-category"></p>
        <p id="preview-address"></p>
        <p id="preview-phone"></p>
        <a id="preview-link" href="#" target="_blank" class="preview-kakao-btn">
          카카오맵에서 리뷰/예약 확인 →
        </a>
      </div>
      <button id="add-btn">+ 코스에 추가</button>
    </div>

    <!-- 코스 목록 + 저장 -->
    <div class="course-section">
      <h3>📍 내 코스</h3>
      <ul id="course-list"></ul>

      <!-- 사진 4장 업로드 -->
      <div class="photo-upload-box">
        <p class="photo-upload-title">📷 코스 사진 업로드 (최대 4장)</p>
        <input type="file" id="photo-input" accept="image/*" multiple hidden>
        <input type="file" id="photo-replace-input" accept="image/*" hidden>
        <button id="photo-add-btn" class="photo-add-btn">📷 사진 선택</button>
        <div class="photo-grid">
          <div class="photo-slot" id="slot1">
            <span>+</span>
            <img id="preview1" class="hidden">
          </div>
          <div class="photo-slot" id="slot2">
            <span>+</span>
            <img id="preview2" class="hidden">
          </div>
          <div class="photo-slot" id="slot3">
            <span>+</span>
            <img id="preview3" class="hidden">
          </div>
          <div class="photo-slot" id="slot4">
            <span>+</span>
            <img id="preview4" class="hidden">
          </div>
        </div>
      </div>

      <!-- 코스 이름 입력 + 저장 버튼 -->
      <div class="save-box">
        <input type="text" id="course-name" placeholder="코스 이름을 입력하세요">
        <button id="save-btn">저장</button>
      </div>
    </div>

  </div>

  <!-- 슬롯 옵션 팝업 (body 직계) -->
  <div id="slot-options" class="hidden">
    <div class="slot-options-inner">
      <button id="slot-option-view">🔍 크게 보기</button>
      <button id="slot-option-replace">🔄 사진 교체</button>
      <button id="slot-option-delete">🗑 삭제</button>
      <button id="slot-option-cancel">취소</button>
    </div>
  </div>

  <!-- 크롭 팝업 (body 직계) -->
  <div id="crop-modal" class="hidden">
    <div class="crop-modal-inner">
      <p class="crop-title">사진을 드래그하거나 확대/축소하세요</p>
      <p class="crop-progress" id="crop-progress"></p>
      <div class="crop-area-wrapper" id="crop-area">
        <div class="crop-box" id="crop-box">
          <img id="crop-image">
        </div>
        <div class="crop-overlay"></div>
      </div>
      <p class="crop-hint">🖱 휠 또는 두 손가락으로 확대/축소</p>
      <div class="crop-actions">
        <button id="crop-cancel">취소</button>
        <button id="crop-confirm">확인</button>
      </div>
    </div>
  </div>

  <!-- 사진 뷰어 팝업 (body 직계) -->
  <div id="photo-viewer" class="hidden">
    <div class="photo-viewer-inner">
      <button id="viewer-close">✕</button>
      <button id="viewer-prev">‹</button>
      <div class="viewer-img-wrap">
        <img id="viewer-img">
      </div>
      <button id="viewer-next">›</button>
      <div class="viewer-dots" id="viewer-dots"></div>
    </div>
  </div>

  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=725e3b5f43c47c651837511245861cc8&autoload=false&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script type="module">
    import { initSidebar } from './sidebar.js';
    import './app.js';
    initSidebar();
  </script>
</body>
</html>
