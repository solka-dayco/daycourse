<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코스 상세</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="course.css">
</head>
<body>
  <div id="sidebar-overlay"></div>
  <div id="sidebar">
    <div class="sidebar-header">
      <span>💕 데이코스</span>
      <button id="sidebar-close">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="feed.html">🏠 피드</a>
      <a href="create.html">✏️ 코스 만들기</a>
    </nav>
    <div id="sidebar-auth"></div>
  </div>

  <header>
    <button id="menu-btn">☰</button>
    <span class="page-title">🗺 코스 상세</span>
    <a href="feed.html" class="back-btn">← 뒤로</a>
  </header>

  <div class="course-container">

    <!-- 4분할 썸네일 -->
    <div class="detail-thumbnail" id="detail-thumbnail"></div>

    <!-- 코스 제목 + 날짜 + 작성자 -->
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <span id="detail-date"></span>
      <span id="detail-author"></span>
    </div>

    <!-- 코스 장소 목록 -->
    <div class="detail-section">
      <h3>📍 코스 목록</h3>
      <ul id="detail-places"></ul>
    </div>

    <!-- 지도 -->
    <div class="detail-section">
      <h3>🗺 동선 지도</h3>
      <div id="detail-map"></div>
    </div>

    <!-- 삭제 버튼 -->
    <div class="detail-delete">
      <button id="delete-btn">🗑 게시글 삭제</button>
    </div>

    <!-- 좋아요 / 댓글 / 공유 -->
    <div class="detail-actions">
      <button id="like-btn">❤️ <span id="like-count">0</span></button>
      <button id="comment-scroll-btn">💬 <span id="comment-count">0</span></button>
      <button id="share-btn">📤 공유</button>
    </div>

    <!-- 댓글 섹션 -->
    <div class="detail-section" id="comments">
      <h3>💬 댓글</h3>
      <div class="comment-input-box" id="comment-input-area">
        <input type="text" id="comment-content" placeholder="댓글을 입력하세요" maxlength="100">
        <button id="comment-submit">등록</button>
      </div>
      <ul id="comment-list"></ul>
    </div>

  </div>

  <!-- 토스트 메시지 -->
  <div id="toast" class="toast hidden">링크가 복사됐습니다! 🔗</div>

  <!-- 공유 팝업 -->
  <div id="share-modal" class="hidden">
    <div class="share-modal-inner">
      <p class="share-title">공유하기</p>
      <div class="share-options">
        <button id="share-copy-btn">
          <div class="share-icon">🔗</div>
          <span>링크 복사</span>
        </button>
        <button id="share-kakao-btn">
          <div class="share-icon kakao-icon">
            <img src="https://developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_small.png">
          </div>
          <span>카카오톡</span>
        </button>
      </div>
      <button id="share-close">닫기</button>
    </div>
  </div>
  <div id="photo-viewer" class="hidden">
    <div class="photo-viewer-inner">
      <button id="viewer-close">✕</button>
      <button id="viewer-prev">‹</button>
      <div class="viewer-img-wrap">
        <img id="viewer-img">
      </div>
      <button id="viewer-next">›</button>
      <div class="viewer-dots" id="viewer-dots"></div>
    </div>
  </div>

  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=725e3b5f43c47c651837511245861cc8&autoload=false"></script>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js"></script> <script type="module">
    import { initSidebar } from './sidebar.js';
    import './course.js';
    initSidebar();
  </script>
</body>
</html>
